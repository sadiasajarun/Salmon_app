<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon · Review booking</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/currency.js"></script>
<script src="../assets/js/payment-state.js"></script>
</head><body>
<div class="page-label">Client · Booking review (37) <small>Token amount · transaction currency explicit · what it buys / doesn’t · lock window</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen" style="padding-bottom:24px"></div>
</div>
<script>
var D=window.SALMON, C=window.Currency, PS=window.PayState, lang='en';
function qs(k){ return new URLSearchParams(location.search).get(k); }
var p=D.projects.find(function(x){return x.slug===qs('slug');})||D.projects.find(function(x){return x.slug==='the-rossa';});
var unit=qs('unit')||'A-7';
// duplicate guard: don't start a new booking while one is in flight
var t0=PS.tickExpiry(); if(PS.inFlight(t0.status)){ location.replace('duplicate-guard.page.html'); }
function s(k){ return D.strings[lang][k]||k; }
function render(){
  var token=PS.CONFIG.tokenBookingBdt;
  var tokenDisp=C.fmtDisplay(C.toDisplay(token,'AED'),'AED');
  var total=p.price?p.price.amountBdtFrom:0;
  var lt='<span class="langtoggle" style="display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden"><button onclick="setLang(\'en\')" style="border:none;background:'+(lang==='en'?'var(--primary)':'transparent')+';color:'+(lang==='en'?'#fff':'var(--ink-subtle)')+';font-size:12px;padding:6px 10px">EN</button><button onclick="setLang(\'bn\')" style="border:none;background:'+(lang==='bn'?'var(--primary)':'transparent')+';color:'+(lang==='bn'?'#fff':'var(--ink-subtle)')+';font-size:12px;padding:6px 10px">বাং</button></span>';
  var h='<div class="appbar"><a class="back" href="unit-detail.page.html?slug='+p.slug+'&unit='+unit+'" style="font-size:20px;text-decoration:none;color:var(--ink)">‹</a><h2>'+(lang==='bn'?'বুকিং পর্যালোচনা':'Review booking')+'</h2>'+lt+'</div>';
  h+='<div class="rowlist" style="margin:8px var(--gutter) 14px"><div class="row"><span>'+(lang==='bn'?'প্রকল্প':'Project')+'</span><span class="u">'+p.name+'</span></div>'+
    '<div class="row"><span>'+(lang==='bn'?'ইউনিট':'Unit')+'</span><span class="u">'+unit+'</span></div>'+
    '<div class="row"><span>'+(lang==='bn'?'মোট সম্পত্তি মূল্য':'Total property price')+'</span><span class="u">'+C.fmtBdt(total)+'</span></div></div>';
  h+='<div class="amount-hero"><div class="lbl" style="font-size:12px;color:var(--ink-subtle)">'+(lang==='bn'?'টোকেন বুকিং পরিমাণ':'Token booking amount')+'</div><div class="amt">'+tokenDisp+'<div class="bdt">'+C.fmtBdt(token)+'</div></div></div>';
  h+='<div class="txncur">'+(lang==='bn'?'আপনাকে চার্জ করা হবে <b>বিডিটি</b>-তে — প্রকৃত লেনদেন মুদ্রা। উপরের এইডি শুধু আপনার ব্রাউজিং মুদ্রায় রেফারেন্স।':'You will be charged in <b>BDT</b> — the authoritative transaction currency. The AED above is a reference in your browsing currency.')+'</div>';
  h+='<div class="honest"><div class="h did"><span class="ic">✓</span><div class="tx"><b>'+(lang==='bn'?'টোকেন যা করে':'What the token does')+'</b><span>'+(lang==='bn'?'ইউনিট '+unit+' একটি নির্দিষ্ট সময়ের জন্য আপনার জন্য সংরক্ষণ করে':'reserves unit '+unit+' for you for a limited window')+'</span></div></div>'+
    '<div class="h didnt"><span class="ic">!</span><div class="tx"><b>'+(lang==='bn'?'টোকেন যা করে না':'What it does not do')+'</b><span>'+(lang==='bn'?'সম্পূর্ণ ক্রয় নিশ্চিত করে না; বাকি মূল্য কিস্তিতে':'it does not complete the purchase; the balance follows in installments')+'</span></div></div></div>';
  h+='<div class="rowlist" style="margin:0 var(--gutter) 12px"><div class="row"><span>'+(lang==='bn'?'হোল্ড উইন্ডো':'Lock window')+'</span><span class="u">'+PS.CONFIG.lockMinutes+' '+(lang==='bn'?'মিনিট':'minutes')+'</span></div>'+
    '<div class="row"><span>'+(lang==='bn'?'বাতিল ও রিফান্ড':'Cancellation & refund')+'</span><span class="sub">'+(lang==='bn'?'নীতি চূড়ান্ত নয়':'policy TBD')+'</span></div></div>';
  h+='<p class="empty-note" style="text-align:left;margin:0 var(--gutter) 12px">'+(lang==='bn'?'টোকেন পরিমাণ, হোল্ড সময় এবং বাতিল/রিফান্ড নীতি স্যামন এখনো চূড়ান্ত করেনি (OPEN_QUESTIONS)।':'Token amount, lock duration, and cancellation/refund policy are not yet finalised by Salmon (OPEN_QUESTIONS).')+'</p>';
  h+='<a class="btn block" href="terms.page.html?slug='+p.slug+'&unit='+unit+'" style="margin-bottom:16px">'+(lang==='bn'?'শর্তাবলি পড়ুন ও চালিয়ে যান':'Read terms & continue')+'</a>';
  document.getElementById('screen').innerHTML=h;
}
function setLang(l){ lang=l; render(); }
render();
</script>
</body></html>
