<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon · Continue as</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/auth-accounts.js"></script>
<script src="../assets/js/auth-router.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .glang{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface)}
  .glang button{border:none;background:transparent;font-size:12px;padding:6px 11px;color:var(--ink-subtle);cursor:pointer}
  .glang button.on{background:var(--primary);color:#fff}
  .roleopt{display:flex;gap:14px;align-items:center;margin:0 16px 12px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;text-decoration:none;color:var(--ink)}
  .roleopt .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex:0 0 auto}
  .roleopt .t{font-weight:700;font-size:15px}.roleopt .d{font-size:12px;color:var(--ink-subtle);margin-top:2px}
  .ic-buy{background:#f4e6ea;color:var(--primary)} .ic-partner{background:linear-gradient(135deg,#800020,#5c0018);color:#fff}
</style>
</head><body>
<div class="page-label">G05 · Role-ambiguous resolver <small>One identity, both accounts (Shahin buys + refers) · choose per session</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen" style="padding-bottom:20px"></div>
</div>
<script>
var AC=window.AuthAccounts, AR=window.AuthRouter, lang='en';
var dual=AC.find('shahin@example.com');
function t(bn,en){ return lang==='bn'?bn:en; }
function goClient(){ AR.go(AR.DEST.CLIENT_HOME); }
function goPartner(){ var d=AR.partnerStatus(dual.partnerStatus); if(dual.partnerStatus==='approved'){ AR.go(AR.DEST.PARTNER_DASHBOARD); } else { AR.go(d); } }
function render(){
  document.getElementById('screen').innerHTML=
    '<div class="appbar" style="padding-bottom:8px"><a class="back" href="g04-signin.page.html" style="font-size:20px;text-decoration:none;color:var(--ink)">‹</a>'+
    '<h2 style="font-family:var(--serif)">'+t('কীভাবে চালিয়ে যাবেন?','Continue as')+'</h2>'+
    '<span class="glang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span></div>'+
    '<p class="phelp" style="margin:0 16px 14px">'+t('এই আইডেন্টিটিতে দুটি অ্যাকাউন্ট আছে — আপনি ক্রেতা এবং পার্টনার দুটোই। এই সেশনে কোনটিতে ঢুকবেন বেছে নিন।','This identity has two accounts — you’re both a buyer and a partner. Choose which to enter for this session.')+'</p>'+
    '<a class="roleopt" onclick="goClient();return false;" href="#"><span class="ic ic-buy">🏠</span><div><div class="t">'+t('ক্রেতা হিসেবে চালিয়ে যান','Continue as Buyer')+'</div><div class="d">'+t('প্রকল্প, বুকিং, কিস্তি','Projects, bookings, installments')+'</div></div></a>'+
    '<a class="roleopt" onclick="goPartner();return false;" href="#"><span class="ic ic-partner">◆</span><div><div class="t">'+t('সেলস পার্টনার হিসেবে চালিয়ে যান','Continue as Sales Partner')+'</div><div class="d">'+t('পার্টনার আইডি ','Partner ID ')+dual.partnerId+'</div></div></a>'+
    '<p class="empty-note" style="text-align:left;margin:8px 16px">'+t('পরে সাইন আউট না করেই রোল বদলাতে পারবেন — প্রোফাইল থেকে (এই সুইচ পরে যুক্ত হবে; নীতি OPEN_QUESTIONS-এ)।','You can switch role later without signing out — from Profile (the switch is flagged for later; policy in OPEN_QUESTIONS).')+'</p>';
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
