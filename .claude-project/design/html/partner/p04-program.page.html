<!doctype html>
<html lang="bn"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Program</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-state.js"></script>
<script src="../assets/js/network-sim.js"></script>
</head><body>
<div class="page-label">P04 · Program selection <small>Zero Investment · With Investment · Both — one honest line each</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div id="top" style="flex:0 0 auto"></div>
  <div class="screen" style="padding-bottom:80px" id="form"></div>
  <div class="pbtnbar"><a class="btn ghost" href="p03-register-profile.page.html" style="flex:0 0 auto">‹</a><a class="btn" id="next" href="p05-consent.page.html" style="flex:1">Continue</a></div>
</div>
<script>
var P=window.Partner, lang='en', d=P.getDraft();
function t(bn,en){ return lang==='bn'?bn:en; }
function pick(v){ P.saveDraft({program:v}); d=P.getDraft(); render(); }
function bar(){ document.getElementById('top').innerHTML=
  '<div class="wkbar"><a class="bk" href="p03-register-profile.page.html">‹</a><h2>'+t('প্রোগ্রাম','Program')+'</h2>'+
  '<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span></div>'+
  '<div class="stepper"><i class="st done"></i><i class="st done"></i><i class="st on"></i><i class="st"></i><i class="st"></i></div>'+
  '<div class="steplabel">'+t('ধাপ ৩ / ৫ · প্রোগ্রাম নির্বাচন','Step 3 / 5 · Choose a program')+'</div>'; }
function card(key,titleBn,titleEn,lineBn,lineEn){ var on=d.program===key;
  return '<div class="chan'+(on?' on':'')+'" style="border-radius:12px" onclick="pick(\''+key+'\')"><span class="ring"></span><div class="m"><div class="t">'+t(titleBn,titleEn)+'</div><div class="d">'+t(lineBn,lineEn)+'</div></div></div>'; }
function render(){
  bar();
  var Z=P.PROGRAMS.zeroInvestment, W=P.PROGRAMS.withInvestment;
  document.getElementById('form').innerHTML=
    '<p class="phelp" style="margin-top:14px">'+t('আপনি একটি বা উভয় প্রোগ্রামে যোগ দিতে পারেন।','You can join one program or both.')+'</p>'+
    card('zero',Z.bn,Z.en,Z.lineBn,Z.lineEn)+
    card('with',W.bn,W.en,W.lineBn,W.lineEn)+
    card('both',t('উভয়','Both'),t('Both'),t('দুটি প্রোগ্রামেই যোগ দিন।','Join both programs.'),'Join both programs.')+
    '<p class="phelp">'+t('উইথ-ইনভেস্টমেন্ট বেছে নিলে পরবর্তী ধাপে একটি অতিরিক্ত ডিসক্লেইমার থাকবে।','Choosing With Investment adds an extra disclaimer on the next step.')+'</p>';
  document.getElementById('next').textContent=t('চালিয়ে যান','Continue');
  var n=document.getElementById('next'); if(!d.program){ n.style.opacity='.5'; n.style.pointerEvents='none'; } else { n.style.opacity='1'; n.style.pointerEvents='auto'; }
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
