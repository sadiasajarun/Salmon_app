<!doctype html>
<html lang="bn"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Business card</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-state.js"></script>
<script src="../assets/js/territory.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .thumbnote{font-size:11px;color:var(--ink-subtle);text-align:center;margin:0 16px 8px}
  .thumbwrap{display:flex;justify-content:center;gap:12px;align-items:center;margin:0 16px 10px}
  .thumb{width:120px;border-radius:8px;overflow:hidden;box-shadow:0 4px 12px #0002}
  .thumb img{display:block;width:100%}
  .toast{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);background:#241c19;color:#fff;font-size:12.5px;padding:9px 14px;border-radius:999px;opacity:0;transition:opacity .25s}
  .toast.show{opacity:1}
</style>
</head><body>
<div class="page-label">P12 · Digital business card ⭐ <small>Shareable-as-image · print-clean · legible at thumbnail size in a chat</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen" style="padding-bottom:20px"></div>
  <div class="toast" id="toast"></div>
</div>
<script>
var P=window.Partner, TZ=window.Territory, lang='en', pngUrl=null;
function t(bn,en){ return lang==='bn'?bn:en; }
function toast(m){ var el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); setTimeout(function(){el.classList.remove('show');},1500); }
function render(){
  var I=P.identity, a=TZ.assigned;
  document.getElementById('screen').innerHTML=
    '<div class="wkbar"><a class="bk" href="partner-identity.page.html">‹</a><h2>'+t('বিজনেস কার্ড','Business card')+'</h2>'+
    '<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span></div>'+
    // the card (real hierarchy)
    '<div class="bizcard"><div class="top"><div class="brand"><div class="mark">S</div><div><div class="co">SALMON DEVELOPERS</div><div class="tag">CREATING DREAMS</div></div></div>'+
      '<div class="nm">'+t(I.nameBn,I.name)+'</div><div class="role">'+t(I.titleBn,I.title)+'</div></div>'+
      '<div class="bot"><div class="row2"><span>'+t('পার্টনার আইডি','Partner ID')+'</span><b class="pid2">'+I.partnerId+'</b></div>'+
      '<div class="row2"><span>'+t('টেরিটরি','Territory')+'</span><b>'+t(a.districtBn+', '+a.upazilaBn,a.districtEn+', '+a.upazilaEn)+'</b></div>'+
      '<div class="row2"><span>'+t('ফোন','Phone')+'</span><b>'+I.phone+'</b></div></div></div>'+
    '<div class="thumbnote">'+t('চ্যাটে ছোট থাম্বনেইলেও পড়া যায়:','Legible at thumbnail size in a chat:')+'</div>'+
    '<div class="thumbwrap"><div class="thumb"><img id="thumb" alt="thumbnail"></div></div>'+
    '<a class="btn block" onclick="shareImg(event)" href="#" style="margin:6px 16px 0;border-radius:10px">'+t('ছবি হিসেবে শেয়ার করুন','Share as image')+'</a>'+
    '<a class="btn ghost block" onclick="download(event)" href="#" style="margin:10px 16px 16px;border-radius:10px">'+t('ডাউনলোড (PNG)','Download (PNG)')+'</a>';
  drawCard();
}
function drawCard(){
  var I=P.identity, a=TZ.assigned;
  var W=680, H=400, c=document.createElement('canvas'); c.width=W; c.height=H; var g=c.getContext('2d');
  // maroon top
  var grad=g.createLinearGradient(0,0,W,240); grad.addColorStop(0,'#800020'); grad.addColorStop(1,'#5c0018');
  g.fillStyle=grad; g.fillRect(0,0,W,244);
  // white bottom
  g.fillStyle='#ffffff'; g.fillRect(0,244,W,H-244);
  // mark
  g.fillStyle='rgba(255,255,255,.16)'; roundRect(g,40,36,52,52,10); g.fill();
  g.fillStyle='#fff'; g.font='700 26px Inter, system-ui, sans-serif'; g.textBaseline='middle'; g.fillText('S',56,64);
  g.font='600 20px Georgia, serif'; g.fillText('SALMON DEVELOPERS',108,54);
  g.font='400 11px Inter, system-ui, sans-serif'; g.globalAlpha=.85; g.fillText('CREATING DREAMS',108,76); g.globalAlpha=1;
  // name + role
  g.font='700 34px Georgia, serif'; g.fillText(t(I.nameBn,I.name),40,150);
  g.font='400 16px Inter, system-ui, sans-serif'; g.globalAlpha=.92; g.fillText(t(I.titleBn,I.title),40,186); g.globalAlpha=1;
  // bottom rows
  g.textBaseline='alphabetic';
  function row(y,label,val){ g.fillStyle='#5B5350'; g.font='400 15px Inter, system-ui, sans-serif'; g.fillText(label,40,y);
    g.fillStyle='#222222'; g.font='700 15px Inter, system-ui, sans-serif'; g.textAlign='right'; g.fillText(val,W-40,y); g.textAlign='left'; }
  g.fillStyle='#800020'; g.font='700 16px Inter, system-ui, sans-serif'; g.textAlign='right'; g.fillText(I.partnerId,W-40,290); g.textAlign='left';
  g.fillStyle='#5B5350'; g.font='400 15px Inter, system-ui, sans-serif'; g.fillText(t('পার্টনার আইডি','Partner ID'),40,290);
  row(324,t('টেরিটরি','Territory'),t(a.districtBn+', '+a.upazilaBn,a.districtEn+', '+a.upazilaEn));
  row(358,t('ফোন','Phone'),I.phone);
  pngUrl=c.toDataURL('image/png');
  var th=document.getElementById('thumb'); if(th) th.src=pngUrl;
}
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
function download(e){ e.preventDefault(); if(!pngUrl)return; var a=document.createElement('a'); a.href=pngUrl; a.download='salmon-partner-card.png'; a.click(); toast(t('ডাউনলোড হচ্ছে','Downloading')); }
function shareImg(e){ e.preventDefault(); if(!pngUrl)return;
  if(navigator.canShare && window.fetch){ fetch(pngUrl).then(function(r){return r.blob();}).then(function(b){ var f=new File([b],'salmon-partner-card.png',{type:'image/png'});
    if(navigator.canShare({files:[f]})){ navigator.share({files:[f],title:t(P.identity.nameBn,P.identity.name)}).catch(function(){}); } else download(e); }).catch(function(){ download(e); }); }
  else download(e);
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
