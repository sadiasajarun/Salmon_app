<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Enrolment</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-state.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>.wklang{display:inline-flex;border:1px solid #ffffff55;border-radius:999px;overflow:hidden}.wklang button{border:none;background:transparent;color:#fdf3f1;font-size:12px;padding:5px 9px;cursor:pointer}</style>
</head><body>
<div class="page-label">P19 · Enrolment status <small>Which programs he’s in, since when — simple</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen" style="padding-bottom:20px"></div>
</div>
<script>
var P=window.Partner, lang='en';
function t(bn,en){ return lang==='bn'?bn:en; }
function fmt(iso){ try{ return new Intl.DateTimeFormat(lang==='bn'?'bn-BD':'en-GB',{day:'numeric',month:'short',year:'numeric'}).format(new Date(iso)); }catch(e){return iso;} }
function render(){
  var progs=['zeroInvestment','withInvestment'];
  var rows=progs.map(function(k){ var inIt=P.identity.programs.indexOf(k)>-1; var pr=P.PROGRAMS[k];
    var link=k==='zeroInvestment'?'program-zero.page.html':'program-with.page.html';
    return '<a class="row" style="text-decoration:none;color:inherit" href="'+link+'"><span><span class="u">'+t(pr.bn,pr.en)+'</span><br><span class="sub">'+(inIt?t('যোগ দিয়েছেন '+fmt(P.identity.joinDate),'Joined '+fmt(P.identity.joinDate)):t('যোগ দেননি','Not enrolled'))+'</span></span>'+
      (inIt?'<span class="st st-ongoing"><span class="gl">✓</span>'+t('সক্রিয়','Active')+'</span>':'<span class="st st-completed"><span class="gl">•</span>'+t('উপলব্ধ','Available')+' ›</span>')+'</a>'; }).join('');
  document.getElementById('screen').innerHTML=
    '<div class="wkbar"><a class="bk" href="dashboard.page.html">‹</a><h2>'+t('এনরোলমেন্ট','Enrolment')+'</h2>'+
    '<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span></div>'+
    '<div class="rowlist" style="margin:14px 16px 12px">'+rows+'</div>'+
    '<p class="phelp" style="margin:0 16px">'+t('প্রোগ্রামের বিস্তারিত দেখতে ট্যাপ করুন।','Tap a program to see its details.')+'</p>';
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
