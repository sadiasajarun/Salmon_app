<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Dashboard</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-state.js"></script>
<script src="../assets/js/territory.js"></script>
<script src="../assets/js/partner-sales.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .idstrip .pid{font-size:11.5px;opacity:.85}
  .idstrip h2{font-family:var(--serif);font-size:20px;margin:2px 0 5px}
  .idstrip .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:11.5px;opacity:.92}
  .idstrip .acct{position:absolute;top:12px;right:12px;display:flex;gap:8px;align-items:center}
  .idstrip .acct a{color:#fdf3f1;text-decoration:none}
  .idstrip{position:relative}
  .money{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 4px}
  .money .m{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
  .money .m .l{font-size:11px;color:var(--ink-subtle)} .money .m .v{font-size:18px;font-weight:800;margin-top:2px}
  .leadstat{display:flex;gap:6px;padding:6px 16px 2px;overflow-x:auto}
  .leadstat .c{flex:0 0 auto;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 10px;text-align:center;min-width:66px}
  .leadstat .c .n{font-size:17px;font-weight:800} .leadstat .c .k{font-size:10px;color:var(--ink-subtle);margin-top:2px}
  .qa2{display:flex;gap:8px;overflow-x:auto;padding:10px 16px 4px}
  .qa2 a{flex:0 0 auto;background:#f4e6ea;color:var(--primary);border-radius:999px;padding:9px 13px;font-size:12px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px}
  .disp{font-size:10.5px;color:var(--ink-subtle);margin:6px 16px 0;line-height:1.4}
  .wklang{display:inline-flex;border:1px solid #ffffff55;border-radius:999px;overflow:hidden}
  .wklang button{border:none;background:transparent;color:#fdf3f1;font-size:12px;padding:5px 9px;cursor:pointer}
  .wklang button.on{background:#ffffff33}
</style>
</head><body>
<div class="page-label">P15 · Partner dashboard ⭐ <small>Dense work tool · identity/leads/money/target/today/signals · figures are display-only</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen"></div>
  <div class="bottomnav">
    <a class="nav on" href="../partner/dashboard.page.html"><svg viewBox="0 0 24 24"><path d="M4 13h6V4H4zM14 20h6V4h-6zM4 20h6v-5H4z"/></svg>Dashboard</a>
    <a class="nav" href="../partner/leads.page.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Leads</a>
    <a class="nav" href="../partner/commission.page.html"><svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h16"/></svg>Commission</a>
    <a class="nav" href="../partner/profile.page.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Account</a>
  </div>
</div>
<script>
var P=window.Partner, TZ=window.Territory, S=window.PartnerSales, lang='en';
function t(bn,en){ return lang==='bn'?bn:en; }
function s(k){ return S.strings[lang][k]||k; }
function bdt(n){ var x=String(Math.round(n)); var l=x.slice(-3),r=x.slice(0,-3); if(r)r=r.replace(/\B(?=(\d{2})+(?!\d))/g,','); return '৳ '+(r?r+','+l:l); }
function ago(iso){ try{ return new Intl.DateTimeFormat(lang==='bn'?'bn-BD':'en-GB',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit',hour12:true,timeZone:'Asia/Dhaka'}).format(new Date(iso)); }catch(e){return iso.slice(0,10);} }
function render(){
  var I=P.identity, a=TZ.assigned, d=S.dashboard, c=S.counts();
  var progs=I.programs.map(function(k){ return t(P.PROGRAMS[k].bn,P.PROGRAMS[k].en); }).join(', ');
  var active=c.submitted+c.contacted+c.meetingScheduled+c.visitCompleted;
  var pct=Math.round(d.achievedBdt/d.targetBdt*100);
  var lt='<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span>';
  var h=
    '<div class="phead idstrip"><div class="acct"><a href="partner-identity.page.html" aria-label="Account" style="font-size:18px">⚙</a>'+lt+'</div>'+
    '<div class="pid">'+t('পার্টনার আইডি','Partner ID')+' · '+I.partnerId+'</div>'+
    '<h2>'+t(I.nameBn,I.name)+'</h2>'+
    '<div class="meta"><span class="rank">◆ '+t(P.RANKS[I.rank].bn,P.RANKS[I.rank].en)+'</span><span>'+t(a.districtBn+' › '+a.upazilaBn,a.districtEn+' › '+a.upazilaEn)+'</span><span>· '+progs+'</span></div></div>';
  // leads by status
  h+='<div class="sectitle" style="margin:12px 16px 2px">'+s('leads')+'</div>'+
    '<div class="leadstat">'+S.STATUS_ORDER.map(function(k){ return '<div class="c"><div class="n"'+(k==='converted'?' style="color:var(--success)"':'')+'>'+c[k]+'</div><div class="k">'+t(S.STATUS[k].bn,S.STATUS[k].en)+'</div></div>'; }).join('')+'</div>';
  // money (display values)
  h+='<div class="money"><div class="m"><div class="l">'+s('approvedCommission')+'</div><div class="v" style="color:var(--primary)">'+bdt(d.approvedCommissionBdt)+'</div></div>'+
    '<div class="m"><div class="l">'+s('pendingSettlement')+'</div><div class="v" style="color:#B7791F">'+bdt(d.pendingSettlementBdt)+'</div></div></div>'+
    '<div class="disp">'+s('displayNote')+'</div>';
  // target (display, no projection)
  h+='<div class="pad" style="margin-top:8px"><div class="wktile"><div class="k">'+s('target')+' · '+t(d.periodBn,d.periodEn)+'</div>'+
    '<div class="v" style="font-size:16px">'+bdt(d.achievedBdt)+' <span style="font-size:12px;color:var(--ink-subtle);font-weight:500">/ '+bdt(d.targetBdt)+'</span> · '+pct+'%</div>'+
    '<div class="bar"><i style="width:'+pct+'%"></i></div></div></div>';
  // today
  h+='<div class="wkgrid"><div class="wktile"><div class="k">'+s('today')+'</div><div class="v">'+d.meetingsToday+' <span style="font-size:12px;font-weight:500;color:var(--ink-subtle)">'+s('meetings')+'</span></div></div>'+
    '<div class="wktile"><div class="k">'+t('কাজ','Tasks')+'</div><div class="v">'+d.openTasks+' <span style="font-size:12px;font-weight:500;color:var(--ink-subtle)">'+s('tasks')+'</span></div></div></div>';
  // quick actions
  h+='<div class="sectitle" style="margin:6px 16px 0">'+s('quickActions')+'</div>'+
    '<div class="qa2">'+S.quickActions.map(function(q){ return '<a href="'+q.link+'">'+q.icon+' '+t(q.bn,q.en)+'</a>'; }).join('')+'</div>';
  // signals
  h+='<div class="sectitle" style="margin:10px 16px 0">'+s('signals')+'</div><div class="rowlist" style="margin:0 16px 12px">'+
    S.signals.map(function(g){ return '<a class="row" style="text-decoration:none;color:inherit" href="'+g.link+'"><span class="u" style="font-weight:500;font-size:13px">'+t(g.bn,g.en)+'</span><span class="sub">'+ago(g.t).split(',')[0]+'</span></a>'; }).join('')+'</div>';
  // account + logout
  h+='<div class="qa2" style="padding-bottom:2px"><a href="projects.page.html">🗂 '+t('সেলস ক্যাটালগ','Sales catalogue')+'</a><a href="tasks.page.html">🗓 '+t('কাজ','Tasks')+'</a><a href="targets.page.html">🎯 '+t('লক্ষ্য','Targets')+'</a><a href="training-library.page.html">📚 '+t('প্রশিক্ষণ','Training')+'</a><a href="calendar.page.html">📅 '+t('ক্যালেন্ডার','Calendar')+'</a><a href="booking-record.page.html">🧾 '+t('সেল রেকর্ড','Record a sale')+'</a><a href="notice-board.page.html">📢 '+t('নোটিশ','Notices')+'</a><a href="enrolment.page.html">📋 '+t('প্রোগ্রাম','Programs')+'</a><a href="quick-actions.page.html">⚡ '+t('দ্রুত কাজ','Quick actions')+'</a></div>'+
    '<a class="btn ghost block" href="partner-identity.page.html" style="margin:10px 16px 8px;border-radius:10px">'+t('আমার পরিচয় ও বিজনেস কার্ড','My identity & business card')+'</a>'+
    '<a class="btn ghost block" href="../shared/g02-welcome.page.html" style="margin:0 16px 16px;border-radius:10px">'+t('লগ আউট','Log out')+'</a>';
  document.getElementById('screen').innerHTML=h;
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
