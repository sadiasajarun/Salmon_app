<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Record status</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/mock-data.js"></script>
<script src="../assets/js/partner-ops.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>.wklang{display:inline-flex;border:1px solid #ffffff55;border-radius:999px;overflow:hidden}.wklang button{border:none;background:transparent;color:#fdf3f1;font-size:12px;padding:5px 9px;cursor:pointer}
  .brow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 16px 8px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px}
  .brow .ttl{font-weight:700;font-size:14px}.brow .sub2{font-size:11.5px;color:var(--ink-subtle);margin-top:2px}
</style>
</head><body>
<div class="page-label">P42 · Record status <small>Unverified until finance confirms · a claim awaiting confirmation, not a done deal</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen" style="padding-bottom:20px"></div>
</div>
<script>
var D=window.SALMON, O=window.PartnerOps, lang='en'; var K='salmon_booking_draft';
function t(bn,en){ return lang==='bn'?bn:en; }
function bdt(n){ if(!n)return '—'; var x=String(Math.round(n)); var l=x.slice(-3),r=x.slice(0,-3); if(r)r=r.replace(/\B(?=(\d{2})+(?!\d))/g,','); return '৳ '+(r?r+','+l:l); }
function draft(){ try{ return JSON.parse(localStorage.getItem(K))||{}; }catch(e){ return {}; } }
function pill(st){ if(st==='verified') return '<span class="st st-ongoing"><span class="gl">✓</span>'+t('যাচাইকৃত','Verified')+'</span>'; return '<span class="st st-upcoming"><span class="gl">◔</span>'+t('যাচাই হয়নি','Unverified')+'</span>'; }
function render(){
  var d=draft(); var lt='<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span>';
  var h='<div class="wkbar"><a class="bk" href="dashboard.page.html">‹</a><h2>'+t('রেকর্ড অবস্থা','Record status')+'</h2>'+lt+'</div>'+
    '<div class="stathero" style="padding-top:16px"><div class="ic" style="background:#f7efe0;color:#B7791F">◔</div>'+
    '<h1 style="font-size:20px">'+t('রেকর্ড জমা হয়েছে — যাচাই হয়নি','Record submitted — Unverified')+'</h1>'+
    '<p>'+t('আপনি একটি বুকিং রেকর্ড জমা দিয়েছেন। ফিন্যান্স ওয়েব প্যানেলে এটি নিশ্চিত না করা পর্যন্ত এটি “যাচাই হয়নি” থাকবে। এটি একটি দাবি, চূড়ান্ত ডিল নয়।','You’ve submitted a booking record. It stays “Unverified” until finance confirms it on the web panel. This is a claim awaiting confirmation, not a done deal.')+'</p></div>'+
    '<div class="rowlist" style="margin:0 16px 12px"><div class="row"><span>'+t('ইউনিট','Unit')+'</span><span class="u">'+((d.unit)||'—')+'</span></div>'+
    '<div class="row"><span>'+t('পরিমাণ','Amount')+'</span><span class="u">'+bdt(d.amount)+'</span></div>'+
    '<div class="row"><span>'+t('পদ্ধতি','Method')+'</span><span class="u">'+(d.method?O.methodLabel(d.method,lang):'—')+'</span></div>'+
    '<div class="row"><span>'+t('অবস্থা','Status')+'</span>'+pill('unverified')+'</div></div>'+
    '<div class="wall" style="margin:0 16px 12px;background:#faf3ec;border:1px dashed #e3d3c1;border-radius:12px;padding:12px 13px;font-size:12px;color:var(--ink-subtle);line-height:1.55">🔒 '+t('আপনি একটি সরল অবস্থা দেখছেন — যাচাই-ট্রেইল বা ফিন্যান্সের অভ্যন্তরীণ কিছু দেখানো হয় না।','You see a simple state — not the verification trail or anything internal from finance.')+'</div>'+
    '<div class="sectitle" style="margin-left:16px">'+t('আপনার বুকিং রেকর্ড','Your booking records')+'</div>';
  O.bookingRecords.forEach(function(b){ h+='<div class="brow"><div><div class="ttl">'+b.unit+' · '+b.project+'</div><div class="sub2">'+t(b.leadNameBn,b.leadName)+' · '+bdt(b.amountBdt)+' · '+O.methodLabel(b.method,lang)+'</div></div>'+pill(b.status)+'</div>'; });
  h+='<a class="btn ghost block" href="dashboard.page.html" style="margin:12px 16px 16px;border-radius:10px">'+t('ড্যাশবোর্ড','Dashboard')+'</a>';
  document.getElementById('screen').innerHTML=h;
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
