<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Earnings</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-ledger.js"></script>
<script src="../assets/js/settlement-state.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .wklang{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface)}
  .wklang button{border:none;background:transparent;font-size:12px;padding:6px 10px;color:var(--ink-subtle);cursor:pointer}.wklang button.on{background:var(--primary);color:#fff}
  .headline{margin:12px 16px 6px;background:linear-gradient(135deg,#fff,#faf0f2);border:1px solid #eccdd5;border-radius:16px;padding:18px;text-align:center}
  .headline .l{font-size:12px;color:var(--ink-subtle);letter-spacing:.03em}
  .headline .v{font-size:32px;font-weight:800;color:var(--primary);margin-top:3px}
  .buckets{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 16px 4px}
  .bkt{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px}
  .bkt .lab{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700}
  .bkt .n{font-size:18px;font-weight:800;margin-top:4px}
  .bkt .dot{width:9px;height:9px;border-radius:3px;display:inline-block}
  .d-pending{background:#B7791F}.d-approved{background:#1E7A46}.d-req{background:#6B7280}.d-settled{background:#800020}
</style>
</head><body>
<div class="page-label">P43 · Earnings overview <small>Only Approved is requestable · Pending never folded into the headline · buckets label + colour</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen"></div>
  <div class="bottomnav">
    <a class="nav" href="../partner/dashboard.page.html"><svg viewBox="0 0 24 24"><path d="M4 13h6V4H4zM14 20h6V4h-6zM4 20h6v-5H4z"/></svg>Dashboard</a>
    <a class="nav" href="../partner/leads.page.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Leads</a>
    <a class="nav on" href="../partner/commission.page.html"><svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h16"/></svg>Commission</a>
    <a class="nav" href="../partner/partner-identity.page.html"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.4"/><path d="M12 2v3M12 19v3M4.5 4.5l2 2M17.5 17.5l2 2M2 12h3M19 12h3M4.5 19.5l2-2M17.5 6.5l2-2"/></svg>Account</a>
  </div>
</div>
<script>
var L=window.PartnerLedger, ST=window.Settlement, lang='en';
function t(bn,en){ return lang==='bn'?bn:en; }
function bdt(n){ var x=String(Math.round(n)); var l=x.slice(-3),r=x.slice(0,-3); if(r)r=r.replace(/\B(?=(\d{2})+(?!\d))/g,','); return '৳ '+(r?r+','+l:l); }
function render(){
  var b=L.buckets(); var lt='<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span>';
  var inflight=ST.inFlight(ST.load().status);
  var h='<div class="appbar"><h2>'+L.strings[lang].earnings+'</h2>'+lt+'</div>'+
    '<div class="headline"><div class="l">'+L.strings[lang].requestable+'</div><div class="v">'+bdt(b.approved)+'</div></div>'+
    '<div class="buckets">'+
    '<div class="bkt"><div class="lab"><span class="dot d-approved"></span>'+t('অনুমোদিত','Approved')+'</div><div class="n" style="color:#1E7A46">'+bdt(b.approved)+'</div></div>'+
    '<div class="bkt"><div class="lab"><span class="dot d-pending"></span>'+t('অপেক্ষমাণ','Pending')+'</div><div class="n" style="color:#B7791F">'+bdt(b.pending)+'</div></div>'+
    '<div class="bkt"><div class="lab"><span class="dot d-req"></span>'+t('অনুরোধকৃত','Requested')+'</div><div class="n" style="color:#6B7280">'+bdt(b.settlementRequested)+'</div></div>'+
    '<div class="bkt"><div class="lab"><span class="dot d-settled"></span>'+t('পরিশোধিত','Settled')+'</div><div class="n" style="color:var(--primary)">'+bdt(b.settled)+'</div></div></div>'+
    '<p class="phelp" style="margin:6px 16px 0">'+L.strings[lang].onlyApproved+'</p>'+
    '<a class="btn block" href="request-settlement.page.html" style="margin:14px 16px 0;border-radius:10px">'+L.strings[lang].requestSettlement+'</a>'+
    (inflight?'<a class="btn ghost block" href="settlement-status.page.html" style="margin:10px 16px 0;border-radius:10px">'+t('চলমান সেটেলমেন্ট দেখুন','View settlement in progress')+'</a>':'')+
    '<div class="qa2" style="padding:12px 16px"><a href="commission-ledger.page.html">📒 '+L.strings[lang].ledger+'</a><a href="settlement-history.page.html">🧾 '+L.strings[lang].settlementHistory+'</a></div>';
  document.getElementById('screen').innerHTML=h;
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
