<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Profile</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-state.js"></script>
<script src="../assets/js/territory.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .wklang{display:inline-flex;border:1px solid #ffffff55;border-radius:999px;overflow:hidden}
  .wklang button{border:none;background:transparent;color:#fdf3f1;font-size:12px;padding:5px 9px;cursor:pointer}.wklang button.on{background:#ffffff33}
  .phero{display:flex;align-items:center;gap:14px;padding:16px}
  .phero .av{width:64px;height:64px;border-radius:50%;background:#f0e6ea;color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px}
  .phero .nm{font-family:var(--serif);font-size:21px} .phero .sub2{font-size:12px;color:var(--ink-subtle);margin-top:2px}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px}
  .kv .k{color:var(--ink-subtle)} .kv .v{font-weight:600;text-align:right}
  .menu a{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;font-size:14px}
  .menu a .ch{margin-left:auto;color:var(--ink-subtle)}
</style>
</head><body>
<div class="page-label">P74 · Profile <small>Name · photo · contact details · gateway to preferences/security</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen" style="padding-bottom:20px"></div>
</div>
<script>
var P=window.Partner, TZ=window.Territory, lang='en';
function t(bn,en){ return lang==='bn'?bn:en; }
function render(){
  var I=P.identity, a=TZ.assigned;
  var lt='<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span>';
  document.getElementById('screen').innerHTML=
    '<div class="wkbar"><a class="bk" href="dashboard.page.html">‹</a><h2>'+t('প্রোফাইল','Profile')+'</h2>'+lt+'</div>'+
    '<div class="phero"><span class="av">'+t(I.nameBn,I.name).charAt(0)+'</span><div><div class="nm">'+t(I.nameBn,I.name)+'</div><div class="sub2">'+t(I.titleBn,I.title)+' · '+I.partnerId+'</div></div></div>'+
    '<div class="kv"><span class="k">'+t('ফোন','Phone')+'</span><span class="v">'+I.phone+'</span></div>'+
    '<div class="kv"><span class="k">'+t('ইমেইল','Email')+'</span><span class="v">'+I.email+'</span></div>'+
    '<div class="kv"><span class="k">'+t('এলাকা','Territory')+'</span><span class="v">'+t(a.districtBn+' › '+a.upazilaBn,a.districtEn+' › '+a.upazilaEn)+'</span></div>'+
    '<div class="menu" style="margin-top:8px">'+
      '<a href="preferences.page.html">⚙ '+t('পছন্দসমূহ','Preferences')+'<span class="ch">›</span></a>'+
      '<a href="security.page.html">🔒 '+t('নিরাপত্তা','Security')+'<span class="ch">›</span></a>'+
      '<a href="partner-identity.page.html">🪪 '+t('পরিচয় ও বিজনেস কার্ড','Identity & business card')+'<span class="ch">›</span></a>'+
      '<a href="notifications.page.html">🔔 '+t('বিজ্ঞপ্তি','Notifications')+'<span class="ch">›</span></a>'+
      '<a href="raise-ticket.page.html">🎫 '+t('টিকিট','Tickets')+'<span class="ch">›</span></a>'+
    '</div>'+
    '<a class="btn ghost block" href="../shared/g02-welcome.page.html" style="margin:14px 16px 16px;border-radius:10px">'+t('লগ আউট','Log out')+'</a>';
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
