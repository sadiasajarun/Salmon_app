<!doctype html>
<html lang="bn"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Consent</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-state.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .cl{display:flex;gap:11px;align-items:flex-start;margin:12px 16px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer}
  .cl input{position:absolute;opacity:0}
  .cl .cbx{width:22px;height:22px;border-radius:6px;border:1.6px solid #cbb9ad;background:#fff;display:grid;place-items:center;color:#fff;font-size:13px;flex:0 0 auto}
  .cl input:checked + .cbx{background:var(--primary);border-color:var(--primary)}
  .cl p{font-size:12.5px;color:var(--ink);line-height:1.5}
  .cl a{color:var(--primary)}
  .disc-line{margin:0 16px 12px;background:#f4e6ea;border:1px solid #e6cdd5;border-radius:10px;padding:11px 12px;font-size:12px;color:#6a4a52;line-height:1.5}
</style>
</head><body>
<div class="page-label">P05 · Consent <small>Terms · privacy · program conditions · nothing pre-ticked · With-Investment extra disclaimer</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div id="top" style="flex:0 0 auto"></div>
  <div class="screen" style="padding-bottom:80px" id="form"></div>
  <div class="pbtnbar"><a class="btn ghost" href="p04-program.page.html" style="flex:0 0 auto">‹</a><a class="btn" id="next" href="p06-referral.page.html" style="flex:1">Continue</a></div>
</div>
<script>
var P=window.Partner, lang='en', d=P.getDraft();
function t(bn,en){ return lang==='bn'?bn:en; }
var C={ terms:false, privacy:false, program:false, invest:false };
function toggle(k){ C[k]=!C[k]; render(); }
function needInvest(){ return d.program==='with'||d.program==='both'; }
function bar(){ document.getElementById('top').innerHTML=
  '<div class="wkbar"><a class="bk" href="p04-program.page.html">‹</a><h2>'+t('সম্মতি','Consent')+'</h2>'+
  '<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span></div>'+
  '<div class="stepper"><i class="st done"></i><i class="st done"></i><i class="st done"></i><i class="st on"></i><i class="st"></i></div>'+
  '<div class="steplabel">'+t('ধাপ ৪ / ৫ · সম্মতি','Step 4 / 5 · Consent')+'</div>'; }
function line(k,bn,en){ return '<label class="cl"><input type="checkbox" '+(C[k]?'checked':'')+' onchange="toggle(\''+k+'\')"><span class="cbx">✓</span><p>'+t(bn,en)+'</p></label>'; }
function render(){
  bar();
  var h=line('terms','আমি <a>সেবার শর্তাবলি</a> পড়েছি ও সম্মত।','I have read and accept the <a>Terms of Service</a>.')+
    line('privacy','আমি <a>গোপনীয়তা নীতি</a>-তে সম্মত।','I agree to the <a>Privacy Policy</a>.')+
    line('program','আমি পার্টনার <a>প্রোগ্রাম শর্তাবলি</a> পড়েছি ও সম্মত।','I have read and accept the partner <a>program conditions</a>.');
  if(needInvest()){
    h+='<div class="disc-line">'+t('উইথ-ইনভেস্টমেন্ট: স্যামন কোনো গ্যারান্টর বা বিনিয়োগ উপদেষ্টা নয়। রিটার্ন নিশ্চিত নয়; সব শর্ত ক্লায়েন্ট-অনুমোদিত।','With Investment: Salmon is not a guarantor or investment adviser. Returns are not guaranteed; all terms are client-approved.')+'</div>';
    h+=line('invest','আমি উইথ-ইনভেস্টমেন্টের অতিরিক্ত শর্ত ও ঝুঁকি বুঝেছি।','I understand the additional With-Investment conditions and risks.');
  }
  document.getElementById('form').innerHTML=h;
  var ok=C.terms&&C.privacy&&C.program&&(!needInvest()||C.invest);
  var n=document.getElementById('next'); n.textContent=t('চালিয়ে যান','Continue'); n.style.opacity=ok?'1':'.5'; n.style.pointerEvents=ok?'auto':'none';
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
