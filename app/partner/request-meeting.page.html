<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Request meeting</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-ops.js"></script>
<script src="../assets/js/network-sim.js"></script>
</head><body>
<div class="page-label">P33 · Request a virtual meeting <small>Pick who, why, preferred times · scheduler confirms on the web panel (request, don’t self-book)</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div id="top" style="flex:0 0 auto"></div>
  <div class="screen" style="padding-bottom:80px" id="form"></div>
  <div class="pbtnbar"><a class="btn ghost" href="calendar.page.html" style="flex:0 0 auto">‹</a><a class="btn" id="submit" href="#" onclick="submitReq(event)" style="flex:1">Request</a></div>
</div>
<script>
var O=window.PartnerOps, lang='en'; var K='salmon_meeting_draft';
function t(bn,en){ return lang==='bn'?bn:en; }
function draft(){ try{ return JSON.parse(localStorage.getItem(K))||{kind:'virtual'}; }catch(e){ return {kind:'virtual'}; } }
function set(k,v){ var d=draft(); d[k]=v; d.kind='virtual'; try{localStorage.setItem(K,JSON.stringify(d));}catch(e){} }
function bar(){ document.getElementById('top').innerHTML=
  '<div class="wkbar"><a class="bk" href="calendar.page.html">‹</a><h2>'+t('মিটিং অনুরোধ','Request a meeting')+'</h2>'+
  '<span class="wklang" style="display:inline-flex;border:1px solid #ffffff55;border-radius:999px;overflow:hidden"><button style="border:none;background:'+(lang==='bn'?'#ffffff33':'transparent')+';color:#fdf3f1;font-size:12px;padding:5px 9px" onclick="setLang(\'bn\')">বাং</button><button style="border:none;background:'+(lang==='en'?'#ffffff33':'transparent')+';color:#fdf3f1;font-size:12px;padding:5px 9px" onclick="setLang(\'en\')">EN</button></span></div>'; }
function render(){
  bar(); var d=draft();
  document.getElementById('form').innerHTML=
    '<label class="pf">'+t('কার সাথে','Who with')+'</label><select class="pinp psel" onchange="set(\'with\',this.value)">'+O.meetingWith.map(function(w){return '<option value="'+w.key+'"'+(d.with===w.key?' selected':'')+'>'+t(w.bn,w.en)+'</option>';}).join('')+'</select>'+
    '<label class="pf">'+t('কারণ','Reason')+'</label><div class="chips" style="padding:0 16px 4px">'+O.meetingReasons.map(function(r){return '<span class="chip'+(d.reason===r.key?' active':'')+'" onclick="pickReason(\''+r.key+'\')">'+t(r.bn,r.en)+'</span>';}).join('')+'</div>'+
    '<label class="pf">'+t('পছন্দের সময় ১','Preferred time 1')+'</label><input class="pinp" type="datetime-local" value="'+(d.pref1||'')+'" oninput="set(\'pref1\',this.value)">'+
    '<label class="pf">'+t('পছন্দের সময় ২','Preferred time 2')+'</label><input class="pinp" type="datetime-local" value="'+(d.pref2||'')+'" oninput="set(\'pref2\',this.value)">'+
    '<label class="pf">'+t('নোট','Notes')+' <span class="opt" style="color:var(--ink-subtle);font-weight:400">'+t('(ঐচ্ছিক)','(optional)')+'</span></label><textarea class="pinp" style="height:56px;resize:none" oninput="set(\'note\',this.value)">'+(d.note||'')+'</textarea>'+
    '<p class="phelp">'+t('আপনি একটি স্লট অনুরোধ করছেন — শিডিউলার ওয়েব প্যানেলে নিশ্চিত করবেন। আপনি সরাসরি কারও ক্যালেন্ডারে বুক করছেন না। খসড়া স্থানীয়ভাবে সংরক্ষিত।','You’re requesting a slot — the scheduler confirms it on the web panel. You’re not booking into anyone’s calendar directly. Draft saved locally.')+'</p>';
  document.getElementById('submit').textContent=t('অনুরোধ পাঠান','Send request');
}
function pickReason(r){ set('reason',r); render(); }
function submitReq(e){ e.preventDefault();
  if(window.NetSim&&NetSim.isOffline()){ alert(t('আপনি অফলাইনে — অনুরোধটি খসড়া হিসেবে সংরক্ষিত, সংযোগ ফিরলে পাঠানো হবে।','You’re offline — the request is saved as a draft and will be sent when you reconnect.')); return; }
  window.location.href='awaiting-slot.page.html';
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
