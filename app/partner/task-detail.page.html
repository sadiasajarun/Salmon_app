<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Task</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-tasks.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .wklang{display:inline-flex;border:1px solid #ffffff55;border-radius:999px;overflow:hidden}
  .wklang button{border:none;background:transparent;color:#fdf3f1;font-size:12px;padding:5px 9px;cursor:pointer}.wklang button.on{background:#ffffff33}
  .p-red{background:#fbeaea;color:#a13636}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line);font-size:13px}
  .kv .k{color:var(--ink-subtle)} .kv .v{font-weight:600;text-align:right}
  .desc{margin:12px 16px;font-size:13.5px;color:var(--ink);line-height:1.6}
  .ctabar{position:absolute;left:0;right:0;bottom:0;background:#fffdfb;border-top:1px solid var(--line);padding:12px 16px}
  .ctabar .btn{margin:0;border-radius:10px;width:100%}
  .screen{padding-bottom:80px}
</style>
</head><body>
<div class="page-label">P64 · Task detail <small>Details · due date · status · who assigned it</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen"></div>
  <div class="ctabar" id="cta"></div>
</div>
<script>
var K=window.PartnerTasks, lang='en';
function qs(k){ return new URLSearchParams(location.search).get(k); }
function t(bn,en){ return lang==='bn'?bn:en; }
function s(k){ return K.strings[lang][k]||k; }
function dt(iso){ try{ return new Intl.DateTimeFormat(lang==='bn'?'bn-BD':'en-GB',{day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Dhaka'}).format(new Date(iso)); }catch(e){ return iso.slice(0,10); } }
function render(){
  var x=K.task(qs('id'))||K.tasks[0]; var st=K.STATUS[x.status];
  var lt='<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span>';
  document.getElementById('screen').innerHTML=
    '<div class="wkbar"><a class="bk" href="tasks.page.html">‹</a><h2>'+s('tasks')+'</h2>'+lt+'</div>'+
    '<h1 style="font-family:var(--serif);font-size:20px;margin:14px 16px 4px;line-height:1.3">'+t(x.titleBn,x.titleEn)+'</h1>'+
    '<div class="desc">'+t(x.descBn,x.descEn)+'</div>'+
    '<div class="kv"><span class="k">'+t('অবস্থা','Status')+'</span><span class="v"><span class="pill '+st.cls+'"><span class="dot"></span>'+t(st.bn,st.en)+'</span></span></div>'+
    '<div class="kv"><span class="k">'+s('due')+'</span><span class="v"'+(x.status==='overdue'?' style="color:#a13636"':'')+'>'+dt(x.dueUtc)+'</span></div>'+
    '<div class="kv"><span class="k">'+s('assignedBy')+'</span><span class="v">'+t(x.assignedByBn,x.assignedByEn)+'</span></div>';
  var cta=document.getElementById('cta');
  if(x.status==='complete'){ cta.innerHTML='<a class="btn ghost" href="tasks.page.html" style="margin:0;border-radius:10px;width:100%">'+t('কাজে ফিরুন','Back to tasks')+'</a>'; }
  else{ cta.innerHTML='<a class="btn" href="task-complete.page.html?id='+x.id+'" style="margin:0;border-radius:10px;width:100%">'+s('markComplete')+'</a>'; }
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
