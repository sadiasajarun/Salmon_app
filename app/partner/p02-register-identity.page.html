<!doctype html>
<html lang="bn"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Registration</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-state.js"></script>
<script src="../assets/js/network-sim.js"></script>
</head><body>
<div class="page-label">P02 · Registration — identity <small>Name · phone+OTP · email · NID · drafts locally (survives 3G drop)</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div id="top" style="flex:0 0 auto"></div>
  <div class="screen" style="padding-bottom:80px" id="form"></div>
  <div class="pbtnbar"><a class="btn ghost" href="../shared/g02-welcome.page.html" style="flex:0 0 auto">‹</a><a class="btn" id="next" href="p03-register-profile.page.html" style="flex:1">Continue</a></div>
</div>
<script>
var P=window.Partner, lang='en', d=P.getDraft(), otpCode='';
function t(bn,en){ return lang==='bn'?bn:en; }
function save(k,v){ d=P.saveDraft(k?({}[k]=v,(function(o){o[k]=v;return o;})({})):{}); flashSaved(); }
function set(k,v){ var o={}; o[k]=v; P.saveDraft(o); d=P.getDraft(); flashSaved(); }
function flashSaved(){ var s=document.getElementById('saved'); if(s){ s.style.opacity='1'; clearTimeout(window._st); window._st=setTimeout(function(){s.style.opacity='0';},1200); } }
function bar(){ document.getElementById('top').innerHTML=
  '<div class="wkbar"><a class="bk" href="../shared/g02-welcome.page.html">‹</a><h2>'+t('রেজিস্ট্রেশন','Registration')+'</h2>'+
  '<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span></div>'+
  '<div class="stepper"><i class="st on"></i><i class="st"></i><i class="st"></i><i class="st"></i><i class="st"></i></div>'+
  '<div class="steplabel">'+t('ধাপ ১ / ৫ · পরিচয়','Step 1 / 5 · Identity')+' <span id="saved" style="color:var(--success);opacity:0;transition:opacity .3s;float:right">✓ '+t('সংরক্ষিত','saved')+'</span></div>'; }
function render(){
  bar();
  document.getElementById('form').innerHTML=
    '<label class="pf">'+t('পুরো নাম','Full name')+'</label><input class="pinp" id="name" placeholder="'+t('আপনার নাম','Your name')+'" value="'+(d.name||'')+'" oninput="set(\'name\',this.value)">'+
    '<label class="pf">'+t('মোবাইল নম্বর','Mobile number')+'</label>'+
    '<div style="display:flex;gap:8px;margin:0 16px"><select class="pinp psel" style="width:96px;margin:0" onchange="set(\'cc\',this.value)"><option>+880</option><option>+971</option></select>'+
    '<input class="pinp" style="flex:1;margin:0;width:auto" type="tel" inputmode="numeric" id="phone" placeholder="01XXXXXXXXX" value="'+(d.phone||'')+'" oninput="set(\'phone\',this.value)"></div>'+
    '<button class="btn ghost" style="margin:10px 16px 0;border-radius:10px" onclick="sendOtp()">'+(otpCode?t('কোড আবার পাঠান','Resend code'):t('যাচাই কোড পাঠান','Send verification code'))+'</button>'+
    '<div id="otpwrap" class="'+(otpCode?'':'hidden')+'"><label class="pf">'+t('৬-সংখ্যার কোড','6-digit code')+'</label><input class="pinp" inputmode="numeric" maxlength="6" placeholder="––––––" value="'+(d.otp||'')+'" oninput="set(\'otp\',this.value)">'+
    (otpCode?'<div class="lock info" style="margin:8px 16px 0">'+t('কোড পাঠানো হয়েছে ','Code sent to ')+'+'+((d.cc||'+880'))+' '+((d.phone||''))+' · '+t('ডেমো কোড: ','demo code: ')+'<b style="font-variant-numeric:tabular-nums;letter-spacing:.1em">'+otpCode+'</b></div>':'')+'</div>'+
    '<label class="pf">'+t('ইমেইল','Email')+' <span class="opt">'+t('(ঐচ্ছিক)','(optional)')+'</span></label><input class="pinp" type="email" id="email" placeholder="you@example.com" value="'+(d.email||'')+'" oninput="set(\'email\',this.value)">'+
    '<label class="pf">'+t('এনআইডি নম্বর','NID number')+'<span class="pflag">'+t('যাচাই পদ্ধতি চূড়ান্ত নয়','method TBD')+'</span></label><input class="pinp" inputmode="numeric" id="nid" placeholder="'+t('জাতীয় পরিচয়পত্র নম্বর','National ID number')+'" value="'+(d.nid||'')+'" oninput="set(\'nid\',this.value)">'+
    '<p class="phelp">'+t('ফোন, ইমেইল, নাকি এনআইডি — কোনটি দিয়ে যাচাই হবে তা এখনো নির্ধারিত হয়নি (OPEN_QUESTIONS)। আপনার লেখা স্বয়ংক্রিয়ভাবে সংরক্ষিত হচ্ছে — সংযোগ বিচ্ছিন্ন হলেও হারাবে না।','Whether verification uses phone, email or NID is not yet decided (OPEN_QUESTIONS). Your input is saved automatically — a dropped connection won’t lose it.')+'</p>';
  document.getElementById('next').textContent=t('চালিয়ে যান','Continue');
}
function sendOtp(){
  if(window.NetSim&&NetSim.isOffline()){ NetSim.blockPay(t('কোড পাঠাতে সংযোগ প্রয়োজন।','You need a connection to send the code.')); return; }
  if(!(d.phone&&d.phone.replace(/\D/g,'').length>=6)){ alert(t('আগে একটি মোবাইল নম্বর দিন।','Enter a mobile number first.')); return; }
  otpCode = ''+Math.floor(100000+Math.random()*900000);   // demo code (no real SMS in prototype)
  render();
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
