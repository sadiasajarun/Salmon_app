<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Content</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-training.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .wklang{display:inline-flex;border:1px solid #ffffff55;border-radius:999px;overflow:hidden}
  .wklang button{border:none;background:transparent;color:#fdf3f1;font-size:12px;padding:5px 9px;cursor:pointer}.wklang button.on{background:#ffffff33}
  /* video: poster frame, tap to play, no autoplay */
  .poster{margin:12px 16px;border-radius:12px;background:linear-gradient(135deg,#3a2028,#800020);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
  .poster .play{width:58px;height:58px;border-radius:50%;background:#ffffffe6;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--primary)}
  .poster .cap{position:absolute;left:12px;bottom:10px;color:#fff;font-size:11px;opacity:.9}
  /* doc: paginated reading surface */
  .doc{margin:12px 16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 16px;min-height:280px}
  .doc h4{font-size:14px;margin:0 0 8px} .doc p{font-size:13px;color:#333;line-height:1.7;margin:0 0 10px}
  .meta{margin:0 16px 8px;font-size:12px;color:var(--ink-subtle)}
  .btns{display:flex;gap:8px;margin:8px 16px 16px} .btns .btn{margin:0;border-radius:10px;flex:1}
</style>
</head><body>
<div class="page-label">P68 · Content viewer <small>Clean playback/reading · video: poster + tap to play, no autoplay with sound</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen" style="padding-bottom:20px"></div>
</div>
<script>
var L=window.PartnerTraining, lang='en';
function qs(k){ return new URLSearchParams(location.search).get(k); }
function t(bn,en){ return lang==='bn'?bn:en; }
function s(k){ return L.strings[lang][k]||k; }
var i=L.item(qs('id'))||L.items[0];
function play(){ var p=document.getElementById('poster'); p.innerHTML='<div style="color:#fff;text-align:center"><div style="font-size:30px">▶</div><div style="font-size:12px;margin-top:6px;opacity:.9">'+t('চলছে (ডেমো)','Playing (demo)')+'</div></div>'; }
function render(){
  L.setViewed(i.id);
  var lt='<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span>';
  var body;
  if(i.type==='video'){
    body='<div class="poster" id="poster" onclick="play()"><div class="play">▶</div><span class="cap">'+i.durationMin+' '+s('min')+' · '+s('playNote')+'</span></div>';
  } else {
    body='<div class="meta">'+i.pages+' '+s('pages')+' · '+i.sizeMb+' MB</div>'+
      '<div class="doc"><h4>'+t(i.titleBn,i.titleEn)+'</h4>'+
      '<p>'+t('এটি একটি রেফারেন্স নথি — প্রশিক্ষণ লাইব্রেরির অংশ। এটি পড়ার জন্য, কোনো পরীক্ষা বা স্কোর নেই।','This is a reference document — part of the training library. It’s for reading; there is no test or score.')+'</p>'+
      '<p>'+t('মাঠপর্যায়ে দেখানোর জন্য এটি ডাউনলোড করে অফলাইনে রাখতে পারেন।','You can download it and keep it offline to show in the field.')+'</p>'+
      '<p style="color:var(--ink-subtle)">'+t('[নমুনা বিষয়বস্তু — প্রকৃত পাঠ্য স্যামন সরবরাহ করবে]','[Sample content — actual text supplied by Salmon]')+'</p></div>';
  }
  var dl=L.isDownloaded(i.id);
  document.getElementById('screen').innerHTML=
    '<div class="wkbar"><a class="bk" href="training-library.page.html">‹</a><h2>'+t('বিষয়বস্তু','Content')+'</h2>'+lt+'</div>'+
    '<h1 style="font-family:var(--serif);font-size:19px;margin:14px 16px 2px;line-height:1.3">'+t(i.titleBn,i.titleEn)+'</h1>'+
    body+
    '<div class="btns"><a class="btn '+(dl?'ghost':'')+'" href="#" onclick="return toggleDl(event)">'+(dl?'✓ '+s('downloaded'):'⬇ '+s('download')+' · '+i.sizeMb+' MB')+'</a></div>';
}
function toggleDl(e){ e.preventDefault();
  if(!L.isDownloaded(i.id) && window.NetSim && window.NetSim.isOffline && window.NetSim.isOffline()){ alert(t('ডাউনলোড করতে সংযোগ দরকার।','You need a connection to download.')); return false; }
  L.setDownloaded(i.id, !L.isDownloaded(i.id)); render(); return false;
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
