<!doctype html>
<html lang="bn"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon Partner · Profile</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/partner-state.js"></script>
<script src="../assets/js/territory.js"></script>
<script src="../assets/js/network-sim.js"></script>
</head><body>
<div class="page-label">P03 · Registration — profile <small>Address · occupation · requested territory cascade (fields TBD)</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div id="top" style="flex:0 0 auto"></div>
  <div class="screen" style="padding-bottom:80px" id="form"></div>
  <div class="pbtnbar"><a class="btn ghost" href="p02-register-identity.page.html" style="flex:0 0 auto">‹</a><a class="btn" id="next" href="p04-program.page.html" style="flex:1">Continue</a></div>
</div>
<script>
var P=window.Partner, TZ=window.Territory, lang='en', d=P.getDraft();
function t(bn,en){ return lang==='bn'?bn:en; }
function set(k,v){ var o={}; o[k]=v; P.saveDraft(o); d=P.getDraft(); flashSaved(); }
function flashSaved(){ var s=document.getElementById('saved'); if(s){ s.style.opacity='1'; clearTimeout(window._st); window._st=setTimeout(function(){s.style.opacity='0';},1200); } }
function name(o){ return lang==='bn'?o.bn:o.en; }
function opt(val,label,sel){ return '<option value="'+val+'"'+(sel===val?' selected':'')+'>'+label+'</option>'; }
function bar(){ document.getElementById('top').innerHTML=
  '<div class="wkbar"><a class="bk" href="p02-register-identity.page.html">‹</a><h2>'+t('রেজিস্ট্রেশন','Registration')+'</h2>'+
  '<span class="wklang"><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button></span></div>'+
  '<div class="stepper"><i class="st done"></i><i class="st on"></i><i class="st"></i><i class="st"></i><i class="st"></i></div>'+
  '<div class="steplabel">'+t('ধাপ ২ / ৫ · প্রোফাইল','Step 2 / 5 · Profile')+' <span id="saved" style="color:var(--success);opacity:0;transition:opacity .3s;float:right">✓ '+t('সংরক্ষিত','saved')+'</span></div>'; }
function cascade(){
  var dv=d.division||'', ds=d.district||'', up=d.upazila||'', un=d.union||'';
  var divObj=TZ.findDivision(dv);
  var districts=divObj?divObj.districts:[];
  var distObj=districts.filter(function(x){return x.key===ds;})[0];
  var upazilas=distObj&&distObj.upazilas?distObj.upazilas:[];
  var upObj=upazilas.filter(function(x){return x.key===up;})[0];
  var unions=upObj&&upObj.unions?upObj.unions:[];
  var h='<label class="pf">'+t('বিভাগ','Division')+'</label><select class="pinp psel" onchange="setCascade(\'division\',this.value)"><option value="">'+t('বিভাগ নির্বাচন','Select division')+'</option>'+
    TZ.divisions.map(function(x){return opt(x.key,name(x),dv);}).join('')+'</select>';
  h+='<label class="pf">'+t('জেলা','District')+'</label><select class="pinp psel" onchange="setCascade(\'district\',this.value)"><option value="">'+t('জেলা নির্বাচন','Select district')+'</option>'+
    districts.map(function(x){return opt(x.key,name(x)+(x.pending?' — '+t('তথ্য শীঘ্রই','data pending'):''),ds);}).join('')+'</select>';
  h+='<label class="pf">'+t('উপজেলা / থানা','Upazila / Thana')+'</label><select class="pinp psel" onchange="setCascade(\'upazila\',this.value)"><option value="">'+t('উপজেলা নির্বাচন','Select upazila')+'</option>'+
    upazilas.map(function(x){return opt(x.key,name(x),up);}).join('')+'</select>';
  h+='<label class="pf">'+t('ইউনিয়ন','Union')+'</label><select class="pinp psel" onchange="set(\'union\',this.value)"><option value="">'+t('ইউনিয়ন নির্বাচন','Select union')+'</option>'+
    unions.map(function(x){return opt(name(x),name(x),un);}).join('')+'</select>';
  return h;
}
function setCascade(level,val){ var o={}; o[level]=val; if(level==='division'){o.district='';o.upazila='';o.union='';} if(level==='district'){o.upazila='';o.union='';} if(level==='upazila'){o.union='';} P.saveDraft(o); d=P.getDraft(); render(); }
function render(){
  bar();
  document.getElementById('form').innerHTML=
    '<label class="pf">'+t('ঠিকানা','Address')+'</label><input class="pinp" placeholder="'+t('গ্রাম / রাস্তা, এলাকা','Village / road, area')+'" value="'+(d.address||'')+'" oninput="set(\'address\',this.value)">'+
    '<label class="pf">'+t('পেশা','Occupation')+'</label><input class="pinp" placeholder="'+t('যেমন: দোকান মালিক','e.g. Shop owner')+'" value="'+(d.occupation||'')+'" oninput="set(\'occupation\',this.value)">'+
    '<div class="steplabel" style="font-weight:600;color:var(--ink);padding-top:14px">'+t('অনুরোধকৃত টেরিটরি','Requested territory')+'</div>'+cascade()+
    '<p class="phelp">'+t('প্রয়োজনীয় ফিল্ডের পূর্ণ তালিকা ও টেরিটরি কাঠামো এখনো নিশ্চিত নয় (OPEN_QUESTIONS)। বর্তমানে শুধু চট্টগ্রাম › কুমিল্লা সম্পূর্ণ পূরণ করা আছে।','The full field list and territory structure are not yet confirmed (OPEN_QUESTIONS). Only Chattogram › Cumilla is fully populated for now.')+'</p>';
  document.getElementById('next').textContent=t('চালিয়ে যান','Continue');
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
