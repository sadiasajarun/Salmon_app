<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon · Video</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/mock-data.js"></script>
<style>
  .vwrap{position:absolute;inset:0;background:#111;display:flex;flex-direction:column}
  .vbar{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;gap:10px;padding:12px 14px;color:#fff;background:linear-gradient(#000000cc,transparent)}
  .vbar .x{width:38px;height:38px;border-radius:999px;background:#00000066;border:1px solid #ffffff44;color:#fff;font-size:19px;display:grid;place-items:center;cursor:pointer;text-decoration:none;flex:0 0 auto}
  .vbar .nm{font-family:var(--serif);font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .vbar .yt{flex:0 0 auto;font-size:11.5px;color:#fff;text-decoration:none;background:#00000066;border:1px solid #ffffff44;border-radius:999px;padding:7px 11px}
  .poster{position:absolute;inset:0;background:#000 center/cover;display:grid;place-items:center;cursor:pointer}
  .poster::before{content:"";position:absolute;inset:0;background:#0004}
  .play{position:relative;width:74px;height:74px;border-radius:999px;background:#800020e6;display:grid;place-items:center;color:#fff;font-size:30px;box-shadow:0 8px 24px #0006}
  .plabel{position:absolute;bottom:26px;left:0;right:0;text-align:center;color:#fff;font-size:12.5px;z-index:2;padding:0 20px}
  .frame{position:absolute;inset:0;top:0;border:0;width:100%;height:100%;display:none;background:#000}
  .frame.on{display:block}
  .estate{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#cbb9ad;text-align:center;padding:0 32px}
</style>
</head><body>
<div class="page-label">Client · Video (30) <small>Real YouTube · poster + tap-to-play · Watch-on-YouTube fallback (file:// safe)</small></div>

<div class="device">
  <div class="statusbar" style="position:relative;z-index:9;background:#111;color:#fff"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" style="padding:0;position:relative;overflow:hidden">
    <div class="vwrap">
      <div class="vbar">
        <a class="x" id="exit" aria-label="Close">✕</a>
        <span class="nm" id="nm">Intro video</span>
        <a class="yt" id="ytlink" target="_blank" rel="noopener" style="display:none">YouTube ↗</a>
      </div>
      <div id="host"></div>
    </div>
  </div>
</div>

<script>
var D=window.SALMON, lang='en';
function qs(k){ return new URLSearchParams(location.search).get(k); }
var p = D.projects.find(function(x){return x.slug===qs('slug');}) || D.projects.find(function(x){return x.slug==='salmon-bellissimo';});
document.getElementById('exit').href='project-detail.page.html?slug='+p.slug;
document.getElementById('nm').textContent=p.name+' · '+D.strings[lang].video;
var host=document.getElementById('host');

if(p.youtube){
  var watch='https://www.youtube.com/watch?v='+p.youtube;
  var ytl=document.getElementById('ytlink'); ytl.href=watch; ytl.style.display='inline-block';
  var poster='https://img.youtube.com/vi/'+p.youtube+'/hqdefault.jpg';
  host.innerHTML=
    '<div class="poster" id="poster" role="button" tabindex="0" aria-label="Play video" style="background-image:url('+poster+')">'+
      '<div class="play">▶</div>'+
      '<div class="plabel">Tap to play. If it doesn’t start, use “YouTube ↗” at the top right.</div>'+
    '</div>'+
    '<iframe class="frame" id="frame" title="'+p.name+' video" allow="autoplay; encrypted-media; picture-in-picture; fullscreen; accelerometer; gyroscope" allowfullscreen></iframe>';
  function play(){
    var f=document.getElementById('frame');
    f.src='https://www.youtube.com/embed/'+p.youtube+'?autoplay=1&rel=0&playsinline=1&modestbranding=1';
    f.classList.add('on');
    document.getElementById('poster').style.display='none';
  }
  var ps=document.getElementById('poster');
  ps.addEventListener('click', play);
  ps.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); play(); } });
} else {
  host.innerHTML='<div class="estate"><div style="font-size:34px">🎬</div><p style="margin-top:12px">'+(lang==='bn'?'এই প্রকল্পের ভিডিও শীঘ্রই আসছে।':'An intro video for this project is coming soon.')+'</p>'+
    '<a class="btn ghost" style="max-width:200px;margin-top:16px" href="project-detail.page.html?slug='+p.slug+'">'+(lang==='bn'?'ফিরে যান':'Back to project')+'</a></div>';
}
</script>
</body></html>
