<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Salmon · Consultation slots</title>
<link rel="stylesheet" href="../_shared.css"/>
<script src="../assets/js/timezone.js"></script>
<script src="../assets/js/network-sim.js"></script>
<style>
  .langtoggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface)}
  .langtoggle button{border:none;background:transparent;font-size:12px;padding:6px 10px;color:var(--ink-subtle);cursor:pointer}
  .langtoggle button.on{background:var(--primary);color:#fff}
  .tzrow{margin:6px var(--gutter) 10px;font-size:12px;color:var(--ink-subtle);background:#f4e6ea;border:1px solid #e6cdd5;border-radius:10px;padding:8px 11px;line-height:1.5}
  .tzrow b{color:var(--primary)}
  .day{margin:0 var(--gutter) 10px}
  .day .dh{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;margin-bottom:8px}
  .day .short{font-size:11px;color:#B7791F;background:#f7efe0;border-radius:999px;padding:2px 8px;font-weight:600}
  .slots{display:flex;flex-wrap:wrap;gap:8px}
  .slot{border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:9px 11px;font-size:12.5px;cursor:pointer;text-align:center;min-width:88px}
  .slot .dh2{display:block;font-size:10.5px;color:var(--ink-subtle);margin-top:2px}
  .slot.off{opacity:.4;cursor:not-allowed}
  .noslot{font-size:12px;color:var(--ink-subtle);background:#faf3ec;border:1px dashed #e3d3c1;border-radius:10px;padding:9px 11px}
  .workaround{margin:14px var(--gutter);background:#f7efe0;border:1px solid #eaddc2;border-radius:16px;padding:16px}
  .workaround b{color:#8a6414}
</style>
</head><body>
<div class="page-label">Client · Consultation slots (59) ★ <small>Client timezone + Dhaka alongside · Sat–Thu week · closed/short days honest</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>●●● ▮</span></div>
  <div class="screen" id="screen"></div>
</div>
<div class="devbar"><h4>Dev · client timezone</h4><div class="dchips" id="tzsel"></div></div>
<script>
var TZ=window.TZ, lang='en';
function render(){
  var data=TZ.build(TZ.getTz(),8);
  var city=TZ.getTz().split('/')[1].replace('_',' ');
  var lt='<span class="langtoggle"><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">বাং</button></span>';
  var h='<div class="appbar"><a class="back" href="contact-hub.page.html" style="font-size:20px;text-decoration:none;color:var(--ink)">‹</a><h2>'+(lang==='bn'?'স্লট বেছে নিন':'Choose a slot')+'</h2>'+lt+'</div>';
  h+='<div class="tzrow">'+(lang==='bn'?'সময় দেখানো হচ্ছে <b>'+city+'</b>-এর, পাশে ঢাকার সময়। স্যামনের অফিস ঢাকা সময়ে (শনি–বৃহঃ) কাজ করে — আপনার সপ্তাহান্তের সাথে মিলবে না।':'Times shown in <b>'+city+'</b>, with Dhaka time alongside. Salmon works Dhaka hours (Sat–Thu) — this won’t line up with your weekend.')+'</div>';
  var totalWaking=0;
  data.days.forEach(function(d){
    totalWaking+=d.wakingCount;
    h+='<div class="day"><div class="dh"><span>'+d.clientDay+'</span>'+(d.isShort?'<span class="short">'+(lang==='bn'?'ঢাকায় সংক্ষিপ্ত দিন':'Short day in Dhaka')+'</span>':'')+'</div>';
    var waking=d.slots.filter(function(s){return s.inWaking;});
    if(waking.length===0){ h+='<div class="noslot">'+(lang==='bn'?'আপনার জাগ্রত সময়ে কোনো স্লট নেই (অফিস ঢাকা সময়ে)।':'No slots in your waking hours (office is on Dhaka time).')+'</div>'; }
    else { h+='<div class="slots">'+d.slots.map(function(s){ return '<div class="slot'+(s.inWaking?'':' off')+'"'+(s.inWaking?' onclick="pick('+s.utcMs+')"':'')+'>'+s.clientLabel+'<span class="dh2">'+s.dhakaLabel+' Dhaka</span></div>'; }).join('')+'</div>'; }
    h+='</div>';
  });
  if(totalWaking===0){
    h+='<div class="workaround"><b>'+(lang==='bn'?'আগামী দুই সপ্তাহে আপনার সময়ে কোনো স্লট নেই।':'No slot in the next fortnight overlaps your waking hours.')+'</b>'+
      '<p style="font-size:12.5px;margin-top:8px;line-height:1.5">'+(lang==='bn'?'স্যামনের অফিস আপনার সময়ের সাথে মিলছে না। আমরা একটি ভোরের/রাতের ব্যতিক্রমী স্লট অথবা ফোন কলের ব্যবস্থা করতে পারি।':'Salmon’s office hours don’t reach your day. We can arrange an early-morning/late-evening exception, or a phone call instead.')+'</p>'+
      '<a class="btn block" href="chat-thread.page.html" style="margin-top:12px">'+(lang==='bn'?'ব্যতিক্রমী স্লট অনুরোধ করুন':'Request an exception')+'</a></div>';
  }
  h+='<p class="empty-note" style="text-align:left;margin:6px var(--gutter) 16px">'+(lang==='bn'?'স্লট সময়কাল, বাফার ও বুকিং হরাইজন এখনো চূড়ান্ত নয় (OPEN_QUESTIONS)।':'Slot duration, buffer and booking horizon are not yet finalised (OPEN_QUESTIONS).')+'</p>';
  document.getElementById('screen').innerHTML=h;
  document.getElementById('tzsel').innerHTML=TZ.CLIENT_TZS.map(function(t){return '<button class="'+(TZ.getTz()===t.id?'on':'')+'" onclick="setTz(\''+t.id+'\')">'+t.label+'</button>';}).join('');
}
function pick(utc){ location.href='consultation-confirmed.page.html?t='+utc; }
function setTz(t){ TZ.setTz(t); render(); }
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
</body></html>
