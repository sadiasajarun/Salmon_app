</head><body>
<div class="page-label">Client ¬∑ Unit list (35) <small>Status chips ¬∑ only Available is bookable ¬∑ seeing what‚Äôs gone is a selling tool</small></div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>Salmon</span><span>‚óè‚óè‚óè ‚ñÆ</span></div>
  <div class="screen" id="screen"></div>

    <a class="nav" href="../client/installments.page.html"><svg viewBox="0 0 24 24"><path d="M4 5h16M4 12h16M4 19h16"/></svg>Ledger</a>

  </div>
</div>
<script>
var D=window.SALMON, C=window.Currency, PS=window.PayState, lang='en';
function qs(k){ return new URLSearchParams(location.search).get(k); }
var p=D.projects.find(function(x){return x.slug===qs('slug');})||D.projects.find(function(x){return x.slug==='the-rossa';});
var GL={available:'‚óè',reserved:'‚ñ†',booked:'‚ñ≤',sold:'‚úï'};
function s(k){ return D.strings[lang][k]||k; }
function chip(st){ var cls={available:'st-ongoing',reserved:'st-completed',booked:'st-upcoming',sold:'st-completed'}[st]; return '<span class="st '+cls+'"><span class="gl">'+GL[st]+'</span>'+s(st)+'</span>'; }
function floorOf(label){ var m=(label||'').match(/^(\d+)/); return m?+m[1]:0; }
function render(){
  var t=PS.tickExpiry();
  var gone=p.units.filter(function(u){return u.status!=='available';}).length;
  var lt='<span class="langtoggle"><button class="'+(lang==='en'?'on':'')+'" onclick="setLang(\'en\')">EN</button><button class="'+(lang==='bn'?'on':'')+'" onclick="setLang(\'bn\')">‡¶¨‡¶æ‡¶Ç</button></span>';
  var h='<div class="appbar"><a class="back" href="project-detail.page.html?slug='+p.slug+'" style="font-size:20px;text-decoration:none;color:var(--ink)">‚Äπ</a><h2>'+(lang==='bn'?'‡¶á‡¶â‡¶®‡¶ø‡¶ü':'Units')+'</h2>'+lt+'</div>';
  if(PS.inFlight(t.status)) h+='<a class="inflight" href="duplicate-guard.page.html">‚è≥ '+(lang==='bn'?'‡¶Ü‡¶™‡¶®‡¶æ‡¶∞ ‡¶è‡¶ï‡¶ü‡¶ø ‡¶≤‡ßá‡¶®‡¶¶‡ßá‡¶® ‡¶ö‡¶≤‡¶õ‡ßá ‚Äî ‡¶¶‡ßá‡¶ñ‡ßÅ‡¶®':'You have a transaction in progress ‚Äî view it')+' ‚Ä∫</a>';
  h+='<div class="ustat"><b>'+gone+'</b> '+(lang==='bn'?'‡¶ü‡¶ø‡¶∞ ‡¶Æ‡¶ß‡ßç‡¶Ø‡ßá ':'of ')+p.units.length+' '+(lang==='bn'?'‡¶¨‡ßÅ‡¶ï ‡¶π‡¶Ø‡¶º‡ßá ‡¶ó‡ßá‡¶õ‡ßá ¬∑ ':'gone ¬∑ ')+'<b>'+p.availableUnits+'</b> '+s('available')+'</div>';
  h+='<div class="legend"><span><span class="gl lg-ongoing">‚óè</span>'+s('available')+'</span><span><span class="gl lg-completed">‚ñ†</span>'+s('reserved')+'</span><span><span class="gl lg-upcoming">‚ñ≤</span>'+s('booked')+'</span><span><span class="gl" style="color:#6B7280">‚úï</span>'+s('sold')+'</span></div>';
  var floors={}; p.units.forEach(function(u){ (floors[floorOf(u.label)]=floors[floorOf(u.label)]||[]).push(u); });
  Object.keys(floors).sort(function(a,b){return a-b;}).forEach(function(f){
    h+='<div class="floor">'+(lang==='bn'?'‡¶§‡¶≤‡¶æ ':'Floor ')+f+'</div>';
    floors[f].forEach(function(u){
      var meta=p.glance.bed+' '+(lang==='bn'?'‡¶¨‡ßá‡¶°':'bed')+' ¬∑ '+p.glance.sqft[0]+' sqft ¬∑ '+p.glance.facing;
      if(u.status==='available') h+='<a class="urow" href="unit-detail.page.html?slug='+p.slug+'&unit='+u.label+'"><div><div class="code">'+u.label+'</div><div class="sub">'+meta+'</div></div>'+chip(u.status)+'</a>';
      else h+='<div class="urow inert"><div><div class="code">'+u.label+'</div><div class="sub">'+meta+'</div></div>'+chip(u.status)+'</div>';
    });
  });
  document.getElementById('screen').innerHTML=h;
}
function setLang(l){ lang=l; document.documentElement.lang=l; render(); }
render();
</script>
